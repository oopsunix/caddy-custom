name: Build and Push Custom Caddy Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 1 * *' # 定时任务，在二进制构建之后执行

permissions:
  contents: read
  packages: write # 允许推送到 GitHub Container Registry (GHCR)

env:
  TZ: Asia/Shanghai

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.tag.outputs.latest_tag }}
    steps:
      - name: 📦 Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: 🏷️ Get latest Caddy tag
        id: tag
        run: |
          latest=$(curl -fsSL "https://api.github.com/repos/caddyserver/caddy/releases/latest" | jq -r '.tag_name')
          echo "latest_tag=$latest" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: 🛒 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔠 Lowercase owner name
        id: owner
        run: |
          echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.owner.outputs.name }}/caddy
            ${{ secrets.DOCKERHUB_USERNAME }}/caddy
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.latest_tag }}
            type=sha,prefix=,format=short

      - name: 🚀 Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}